services:
  - type: web
    name: smart-mock-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build && npm prune --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: http://localhost:5173,https://smart-mock-ui.vercel.app
